<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--bei Verwendung auf iOS: PWA im standalone anzeigen:-->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Countdown</title>

    <!--links zu css, js, etc.-->
    <script type="text/javascript" src="/js/logic.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link type="text/css" href="/css/styles.css" rel="stylesheet">
    <link rel="manifest" href="/manifest.json">
</head>

<body>
    <nav class="topbar">
        <div class="burgerMenu"><a>&#x2261</a></div>
        <div class="menuElems">
            <h2>Einstellungen</h2>
            <div>
                <label for="auswahlDatum">End-Datum</label>
                <input type="date" id="auswahlDatum" name="date">

                <label for="auswahlUhrzeit">End-Uhrzeit</label>
                <input type="time" id="auswahlUhrzeit" name="time">
                <input type="button" id="okButton" value="Ok">
            </div>
        </div>
    </nav>
    

<div class="countdownPanel">
    <h1 id="displayTime"></h1>
    <div class="trennLinie"></div>
    <h3>Ende: XX:XX</h3>
    <h3>Zeit abgelaufen!</h3>
</div>

</body>
</html>
