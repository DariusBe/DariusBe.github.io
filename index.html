<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--bei Verwendung auf iOS: PWA im standalone anzeigen:-->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <!--bei Verwendung auf iOS: PWA ohne Status (Topbar) anzeigen:-->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Countdown</title>

    <!--links zu css, js, etc.-->
    <script type="text/javascript" src="/js/logic.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> 

    <link rel="apple-touch-icon" sizes="144x144" href="/img/iOS_144x144.png">
    <link type="text/css" href="/css/styles.css" rel="stylesheet">
    <link rel="manifest" href="/manifest.json">
</head>

<body onload="logic()">
    <nav class="topbar">
        <a class="burgerMenu" id="bm">&#x2261</a>
        <div class="menuElems" id="me">
            <h2>Einstellungen</h2>
            <label for="auswahlDatum">End-Datum</label>
            <input type="date" id="auswahlDatum" name="date">

            <label for="auswahlUhrzeit">End-Uhrzeit</label>
            <input type="time" id="auswahlUhrzeit" name="time">
            <input type="button" id="okButton" value="Ok">
        </div>
    </nav>

    <div class="countdownPanel">
        <h1 id="displayZeit"></h1>
        <div class="trennLinie"></div>
        <label for="displayRestzeit" id="restzeitLabel">verbliebene Zeit:</label>
        <h3 id="displayRestzeit"></h3>
        <h3 id="meldung">Zeit abgelaufen!</h3>
    </div>

    <div id="ausgabe"></div>

    <div class="ladeBalken"><div class="fuellStand"></div><div>

</body>

</html>
